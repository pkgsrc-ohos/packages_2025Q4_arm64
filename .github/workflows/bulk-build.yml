name: bulk-build

on:
  workflow_dispatch:

permissions: write-all

jobs:
  build:
    strategy:
      max-parallel: 20
      fail-fast: false
      matrix:
        bucket: [a, b, c, d, e, f, g, h, i, j, k, l, m, n, o, p, q, r, s, t, u, v, w, x, y, z, 0-9]
    runs-on: ubuntu-24.04-arm
    container:
      image: ghcr.io/hqzing/docker-mini-openharmony:latest
      volumes:
        - /opt/node20:/__e/node20:rw,rshared
    steps:
      - name: Setup node for actions
        run: |
          curl -L -O https://github.com/hqzing/ohos-node/releases/download/v24.2.0/node-v24.2.0-openharmony-arm64.tar.gz
          mkdir /__e/node20/bin
          tar -zxf node-v24.2.0-openharmony-arm64.tar.gz -C /opt
          ln -s /opt/node-v24.2.0-openharmony-arm64/bin/node /__e/node20/bin/node

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: main_repo

      - name: Checkout Metadata Branch
        uses: actions/checkout@v4
        with:
          ref: metadata
          path: metadata_repo

      - name: Setup Toolchain
        run: |
          cd main_repo
          ./setup-toolchain.sh
          cd ..

      - name: Setup Bootstrap
        run: |
          curl -L -O https://github.com/${{ github.repository }}/releases/download/bootstrap/bootstrap-ohos-2025Q4-arm64-20260226.tar.gz
          tar -xzpf bootstrap-ohos-2025Q4-arm64-20260226.tar.gz -C /
          echo "/storage/Users/currentUser/.pkg/bin:/storage/Users/currentUser/.pkg/sbin" >> $GITHUB_PATH
          mkdir -p /storage/Users/currentUser/.pkg/etc/pkgin
          echo "https://github.com/${{ github.repository }}/releases/download/pkg_summary/" > /storage/Users/currentUser/.pkg/etc/pkgin/repositories.conf

      - name: Build & Sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUCKET: ${{ matrix.bucket }}
        run: |
          cd metadata_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd ../main_repo

          # 筛选当前桶的任务
          TARGET_PKGS=$(grep -E "^[^/]*/${{ matrix.bucket == '0-9' && '[0-9]' || matrix.bucket }}" whitelist.txt || true)
          
          for pkg_path in $TARGET_PKGS; do
            cd /opt/pkgsrc/$pkg_path
            
            PKGBASE=$(make show-var VARNAME=PKGBASE)
            PKGNAME=$(make show-var VARNAME=PKGNAME)
            
            # 1. 增量检查：是否已存在精确版本的 meta
            if [ -f "$GITHUB_WORKSPACE/metadata_repo/${BUCKET}/${PKGNAME}.meta" ]; then
              echo ">>> [SKIP] $PKGNAME exists."
              continue
            fi

            echo ">>> [BUILD] Processing $PKGNAME"

            # 2. 预热依赖：尝试用 pkgin 安装已有的二进制依赖，减少编译
            sudo pkgin update || true
            sudo pkgin -y install $(make show-vars VARNAME=DEPENDS) || true

            # 3. 正式编译并打包
            if sudo make package-install clean DEPENDS_TARGET=bin-install; then
              
              # 4. 构造完整 URL 元数据
              TGZ_FILE="/opt/pkgsrc/packages/All/${PKGNAME}.tgz"
              # 提取原始 meta
              pkg_info -X "$TGZ_FILE" > temp.meta
              # 注入 GitHub 下载直链
              DL_URL="https://github.com/${REPO_NAME}/releases/download/pkg-${BUCKET}/${PKGNAME}.tgz"
              sed -i "s|^FILE=.*|FILE=${DL_URL}|" temp.meta
              
              # 5. 上传二进制包到对应的字母桶
              gh release upload "pkg-${BUCKET}" "$TGZ_FILE" --clobber
              
              # 6. 同步到元数据分支（清理旧版本并存入新版本）
              cd "$GITHUB_WORKSPACE/metadata_repo"
              rm -f "${BUCKET}/${PKGBASE}-"*.meta
              cp "$GITHUB_WORKSPACE/main_repo/temp.meta" "${BUCKET}/${PKGNAME}.meta"
              
              git add .
              git commit -m "Update $PKGBASE to $PKGNAME"
              
              # 并发推送冲突处理
              RETRY_COUNT=0
              until git pull --rebase origin metadata && git push origin metadata; do
                RETRY_COUNT=$((RETRY_COUNT + 1))
                [ $RETRY_COUNT -gt 5 ] && exit 1
                sleep $(( (RANDOM % 10) + 1 ))
              done
              
              cd "$GITHUB_WORKSPACE/main_repo"
            fi
          done

  generate-summary:
    needs: build
    if: always() # 即使部分构建失败也生成当前能生成的索引
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Metadata
        uses: actions/checkout@v4
        with:
          ref: metadata

      - name: Final Index Merge
        run: |
          # 扫描所有 .meta 文件并合并
          # 此时每个 PKGBASE 应该只有一个最新的 .meta 文件
          find . -name "*.meta" -exec cat {} + | gzip > pkg_summary.gz
          
      - name: Upload Index
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pkg_summary
          files: pkg_summary.gz
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
